<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone | Bootstrap Professional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="index.css">
</head>

<body class="bg-light">

    <header class="navbar sticky-top bg-white border-bottom py-2">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center gap-2 m-0" href="/">
                <i class="bi bi-instagram fs-4"></i>
                <span class="fw-bold d-none d-sm-inline">Instagram</span>
            </a>

            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-success fw-semibold btn-sm px-3" data-bs-toggle="modal" data-bs-target="#createPostModal">
                    Create a new post
                </button>

                <div class="dropdown">
                    <button class="btn btn-outline-secondary border-0" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Settings">
                        <i class="bi bi-gear-fill"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow mt-2">
                        <li><a class="dropdown-item" href="#">Profile</a></li>
                        <li><a class="dropdown-item" href="#">Accessibility</a></li>
                        <li><a class="dropdown-item" href="#">Privacy and Data</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#">Log out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <nav class="view-selector bg-white border-bottom mb-4" aria-label="View selection">
        <ul class="nav nav-pills justify-content-center" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link view-tab-btn" id="pills-grid-tab" data-bs-toggle="pill" data-bs-target="#pills-grid" type="button" role="tab" aria-controls="pills-grid" aria-selected="false">
                    <i class="bi bi-grid-3x3"></i>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link active view-tab-btn" id="pills-feed-tab" data-bs-toggle="pill" data-bs-target="#pills-feed" type="button" role="tab" aria-controls="pills-feed" aria-selected="true">
                    <i class="bi bi-square-fill"></i>
                </button>
            </li>
        </ul>
    </nav>

    <main class="tab-content" id="pills-tabContent">
        <section class="tab-pane fade container" id="pills-grid" role="tabpanel" aria-labelledby="pills-grid-tab">
            <div class="row g-2 g-md-3">
                <div class="col-4">
                    <div class="ratio ratio-1x1 overflow-hidden rounded">
                        <img src="https://picsum.photos/id/237/400" class="object-fit-cover w-100 h-100" alt="Dog post photo">
                    </div>
                </div>
                </div>
        </section>

        <section class="tab-pane fade show active" id="pills-feed" role="tabpanel" aria-labelledby="pills-feed-tab">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-12 col-md-8 col-lg-6">
                        
                        <article class="card mb-4 post-card shadow-sm border-1">
                            <header class="card-header bg-white d-flex justify-content-between align-items-center py-2 px-3">
                                <h2 class="m-0 fs-6 fw-bold">My Crazy dog Spark!</h2>
                                <time datetime="2026-08-26" class="text-muted small">08/26</time>
                            </header>
                            
                            <img src="https://picsum.photos/id/237/800/600" class="img-fluid" alt="Black dog posing">
                            
                            <footer class="card-body py-2 px-3">
                                <p class="mb-1 fw-bold">204 Likes</p>
                                <p class="mb-0 small">
                                    <strong>sparky_user</strong> Very good photo!
                                </p>
                            </footer>
                        </article>

                        </div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal fade" id="createPostModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
