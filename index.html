<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram-bootstrap | Optimized- Lineamientos de Codigo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="index.css">
</head>

<body class="bg-light">

    <header class="navbar sticky-top py-3">
        <div class="container-fluid px-5 d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center m-0" href="#">
                <i class="bi bi-instagram me-2 fs-4"></i>
                <span class="fw-bold">Instagram</span>
            </a>

            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-custom-green fw-semibold" data-bs-toggle="modal" data-bs-target="#createPostModal">
                    Create a new post
                </button>

                <div class="dropdown">
                    <button class="btn custom-dropdown-btn dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-gear-fill"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm mt-2">
                        <li><a class="dropdown-item" href="#">Profile</a></li>
                        <li><a class="dropdown-item" href="#">Accessibility</a></li>
                        <li><a class="dropdown-item" href="#">Privacy and Data</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#">Log out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <nav class="view-selector-container border-bottom mb-4" aria-label="Selección de vista">
        <ul class="nav nav-pills justify-content-center" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link view-tab-btn" id="pills-grid-tab" data-bs-toggle="pill" data-bs-target="#pills-grid" type="button" role="tab" aria-selected="false">
                    <i class="bi bi-grid-3x3"></i>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link active view-tab-btn" id="pills-feed-tab" data-bs-toggle="pill" data-bs-target="#pills-feed" type="button" role="tab" aria-selected="true">
                    <i class="bi bi-square-fill"></i>
                </button>
            </li>
        </ul>
    </nav>

    <main class="tab-content" id="pills-tabContent">

        <section class="tab-pane fade container" id="pills-grid" role="tabpanel" aria-labelledby="pills-grid-tab">
            <div class="row g-3">
                <div class="col-4">
                    <div class="ratio ratio-1x1"><img src="https://picsum.photos/id/237/400" class="grid-img" alt="Post 1"></div>
                </div>
                <div class="col-4">
                    <div class="ratio ratio-1x1"><img src="https://picsum.photos/id/1/400" class="grid-img" alt="Post 2"></div>
                </div>
                <div class="col-4">
                    <div class="ratio ratio-1x1"><img src="https://picsum.photos/id/10/400" class="grid-img" alt="Post 3"></div>
                </div>
                <div class="col-4">
                    <div class="ratio ratio-1x1"><img src="https://picsum.photos/id/64/400" class="grid-img" alt="Post 4"></div>
                </div>
                <div class="col-4">
                    <div class="ratio ratio-1x1"><img src="https://picsum.photos/id/43/400" class="grid-img" alt="Post 5"></div>
                </div>
                <div class="col-4">
                    <div class="ratio ratio-1x1"><img src="https://picsum.photos/id/26/400" class="grid-img" alt="Post 6"></div>
                </div>
            </div>
        </section>

        <section class="tab-pane fade show active" id="pills-feed" role="tabpanel" aria-labelledby="pills-feed-tab">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-12 col-md-8 col-lg-6">
                        
                        <article class="card post-card shadow-sm">
                            <header class="card-header d-flex justify-content-between align-items-center py-2 px-3">
                                <h2 class="m-0 fs-6 fw-bold">My Crazy dog Spark!</h2>
                                <time class="text-muted small">08/26</time>
                            </header>
                            <img src="https://picsum.photos/id/237/800/600" class="img-fluid" alt="Dog">
                            <footer class="card-body py-2 px-3">
                                <p class="mb-1 fw-bold">204 Likes</p>
                                <p class="mb-0 small">Very good photo!</p>
                            </footer>
                        </article>

                        <article class="card post-card shadow-sm">
                            <header class="card-header d-flex justify-content-between align-items-center py-2 px-3">
                                <h2 class="m-0 fs-6 fw-bold">Greatness of Croatia</h2>
                                <time class="text-muted small">04/09</time>
                            </header>
                            <img src="https://picsum.photos/id/10/800/600" class="img-fluid" alt="Croatia">
                            <footer class="card-body py-2 px-3">
                                <p class="mb-1 fw-bold">26k Likes</p>
                                <p class="mb-0 small">Amazing view.</p>
                            </footer>
                        </article>

                        <article class="card post-card shadow-sm">
                            <header class="card-header d-flex justify-content-between align-items-center py-2 px-3">
                                <h2 class="m-0 fs-6 fw-bold">Cristiano Goal!</h2>
                                <time class="text-muted small">06/12</time>
                            </header>
                            <img src="https://picsum.photos/id/26/800/600" class="img-fluid" alt="Goal">
                            <footer class="card-body py-2 px-3">
                                <p class="mb-1 fw-bold">1M Likes</p>
                                <p class="mb-0 small">Pure class.</p>
                            </footer>
                        </article>

                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal fade" id="createPostModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Create a new post</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <label class="fw-bold mb-1 small" for="captionText">Caption:</label>
                    <textarea id="captionText" class="form-control mb-3" rows="2" placeholder="Add the caption here"></textarea>
                    <div class="d-flex gap-1">
                        <button class="btn btn-light border btn-sm" aria-label="Add photo"><i class="bi bi-camera-fill"></i></button>
                        <button class="btn btn-light border btn-sm" aria-label="Add location"><i class="bi bi-geo-alt-fill"></i></button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-success btn-sm px-3">Publish</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
