<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone - Single Column Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="index.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-2">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-instagram fs-4 me-2"></i>
                <span class="fw-semibold">Instagram</span>
            </a>

            <div class="d-flex align-items-center">
                <button type="button" class="btn btn-custom-green me-2" data-bs-toggle="modal" data-bs-target="#createPostModal">
                    Create a new post
                </button>

                <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle d-flex align-items-center custom-dropdown-btn"
                        type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-gear-fill"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end custom-dropdown-menu mt-1">
                        <li><a class="dropdown-item" href="#">Profile</a></li>
                        <li><a class="dropdown-item" href="#">Accesibility</a></li>
                        <li><a class="dropdown-item" href="#">Privacy and Data</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-custom-danger" href="#">Log out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-3">
        <ul class="nav nav-pills justify-content-center" id="view-tabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active toggle-btn" id="grid-tab" data-bs-toggle="pill"
                    data-bs-target="#grid-view" type="button" role="tab" aria-selected="true">
                    <i class="bi bi-grid-3x3"></i>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link toggle-btn" id="feed-tab" data-bs-toggle="pill" 
                    data-bs-target="#feed-view" type="button" role="tab" aria-selected="false">
                    <i class="bi bi-square-fill"></i>
                </button>
            </li>
        </ul>
    </div>

    <div class="container tab-content pb-5" id="view-tabsContent">

        <div class="tab-pane fade show active" id="grid-view" role="tabpanel" aria-labelledby="grid-tab">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">
                    <div class="mb-3">
                        <img src="https://tse2.mm.bing.net/th/id/OIP.M2FVcf_9-lCO3SZEZ8u_mAHaEK?rs=1&pid=ImgDetMain&o=7&rm=3" class="grid-img" alt="Dog">
                    </div>
                    <div class="mb-3">
                        <img src="https://atlasanimal.com/wp-content/uploads/2021/02/Felinos-Raros.jpg" class="grid-img" alt="Felinos">
                    </div>
                    <div class="mb-3">
                        <img src="https://tse1.mm.bing.net/th/id/OIP.rk2IHMIe6eLnG13kzL3HXwHaE4?rs=1&pid=ImgDetMain&o=7&rm=3" class="grid-img" alt="Sloth">
                    </div>
                    <div class="mb-3">
                        <img src="https://tse1.mm.bing.net/th/id/OIP.8tX8HNKn2WkmzgJ55__DKwHaFj?pid=ImgDet&w=474&h=355&rs=1&o=7&rm=3" class="grid-img" alt="Bird">
                    </div>
                    <div class="mb-3">
                        <img src="https://tse2.mm.bing.net/th/id/OIP.5guKgJ85pysnhCxv99mhngHaE8?rs=1&pid=ImgDetMain&o=7&rm=3" class="grid-img" alt="Monkey">
                    </div>
                    <div class="mb-3">
                        <img src="https://tse2.mm.bing.net/th/id/OIP._0m_nXctycm0PVi8FgwBiAHaE7?rs=1&pid=ImgDetMain&o=7&rm=3" class="grid-img" alt="Perro">
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="feed-view" role="tabpanel" aria-labelledby="feed-tab">
            </div>
    </div>

    <div class="modal fade" id="createPostModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5">Create a new post</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label fw-semibold">Caption:</label>
                    <textarea class="form-control mb-3" rows="3" placeholder="Add the caption here"></textarea>
                    <div class="d-flex gap-2">
                        <button class="btn btn-light border"><i class="bi bi-camera"></i></button>
                        <button class="btn btn-light border"><i class="bi bi-geo-alt"></i></button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-custom-green">Publish</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
